
name: Order Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'test/**'
      - '*.sln'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/**'

jobs:

  build-test:
    runs-on: ubuntu-latest

    env:
      # JWT CONFIG
      Jwt__Secret: ${{ secrets.JWT_SECRET }}
      Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
      Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}

      # DATABASE CONFIG (Render or other)
      ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION }}

      # APP CONFIG
      ConnectionStrings__ServerPort: ${{ secrets.SERVER_PORT }}
      ConnectionStrings__FrontendHost: ${{ secrets.FRONTEND_URL }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test --no-build --verbosity normal
  docker:

    runs-on: ubuntu-latest
    needs: build-test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }} \
                       -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest